# Enable AkiraOS WASM runtime (WAMR) - use unified custom runtime by default
CONFIG_AKIRA_WASM_RUNTIME=y
CONFIG_AKIRA_WASM_API=y
CONFIG_AKIRA_RUNTIME_CUSTOM=y
CONFIG_WAMR_AOT_SUPPORT=n
# Disable legacy modular WAMR runtime (we use AKIRA_RUNTIME_CUSTOM)
# (legacy flag removed to avoid contradictory settings)
# Enable self-test during smoke runs on native_sim
CONFIG_AKIRA_SELFTEST=n
CONFIG_NEWLIB_LIBC=n
CONFIG_PICOLIBC=n
CONFIG_EXTERNAL_LIBC=n
###############################################################################
# Core
###############################################################################
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_I2C=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_STREAM_FLASH=y

###############################################################################
# Kernel & Threads
###############################################################################
# Reduced main/workqueue stack sizes to fit DRAM budget while keeping
# sufficient stack for core tasks. These were lowered after link-time
# DRAM overflow was detected.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_IDLE_STACK_SIZE=512
CONFIG_DYNAMIC_THREAD=y
CONFIG_DYNAMIC_THREAD_ALLOC=y
CONFIG_KERNEL_MEM_POOL=y
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYS_HEAP_RUNTIME_STATS=n
CONFIG_THREAD_MONITOR=n

# State Machine Framework (needed by Zephyr)
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_SMF_INITIAL_TRANSITION=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STATS=y
CONFIG_STATS_NAMES=y
CONFIG_STACK_SENTINEL=y   
CONFIG_STACK_CANARIES=y   
###############################################################################
# Logging & Debug
###############################################################################
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_PRINTK=y    

###############################################################################
# Console & Shell
###############################################################################
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y
CONFIG_SHELL_BACKEND_SERIAL=y
# Note: SHELL_BACKEND_TELNET and NET_SOCKETS_OFFLOAD are enabled per-board
# (WiFi/Ethernet boards only — not applicable to native_sim or constrained MCUs).
CONFIG_SHELL_PROMPT_UART="AkiraOS:~$ "
CONFIG_SHELL_CMD_BUFF_SIZE=128
CONFIG_SHELL_ARGC_MAX=8
CONFIG_SHELL_TAB=y
CONFIG_SHELL_TAB_AUTOCOMPLETION=y
CONFIG_SHELL_HISTORY=y


###############################################################################
# Networking
###############################################################################
CONFIG_NETWORKING=y 
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
# Note: NET_SOCKETS_OFFLOAD is enabled per-board (ESP32 WiFi only).
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_DNS_NUM_CONCUR_QUERIES=1
CONFIG_NET_SOCKETS_DNS_TIMEOUT=3000
CONFIG_NET_MAX_CONN=16
# Enable SO_RCVTIMEO / SO_SNDTIMEO so recv/send on accepted sockets can
# time out instead of blocking forever when the peer stalls.
CONFIG_NET_CONTEXT_RCVTIMEO=y
# TCP windows: larger values improve HTTP throughput
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=2048
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=2048
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

CONFIG_HTTP_SERVER=n
CONFIG_WEBSOCKET_CLIENT=y

# WASM Network API — TCP/UDP stream API for WASM apps.
# Depends on NET_TCP/UDP above; enabled and tuned per-board via board .conf.
CONFIG_AKIRA_WASM_NET=n

# Note: AKIRA_HID, AKIRA_BT_HID, AKIRA_BT_SHELL, AKIRA_WASM_BT_SHELL, and
# AKIRA_WASM_HID are enabled per-board (BT+HID-capable boards only).

# WASM core APIs (no hardware dependency)
CONFIG_AKIRA_WASM_LIFECYCLE=y
CONFIG_AKIRA_WASM_IPC=y
# IPC table sizes — 8 topics / 4 subs supports akira.lifecycle + user topics.
CONFIG_AKIRA_IPC_MAX_TOPICS=8
CONFIG_AKIRA_IPC_MAX_SUBS_PER_TOPIC=4


###############################################################################
# File System & Settings
###############################################################################
CONFIG_FILE_SYSTEM=y
CONFIG_DISK_ACCESS=y
# FAT_FILESYSTEM_ELM and its child options are set per-board (only boards with
# SD card hardware enabled). Boards without SD disable FAT in their .conf file.
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_NVS=y


###############################################################################
# MCUboot / OTA
###############################################################################
CONFIG_BOOTLOADER_MCUBOOT=y
# Enable MCUboot image manager    
CONFIG_MCUBOOT_IMG_MANAGER=y      
# Enable image management (upload, swap, etc.)
CONFIG_IMG_MANAGER=y          
# Enable image validation (signature, hash, etc.)    
CONFIG_IMG_ENABLE_IMAGE_CHECK=y   
# Erase flash sectors progressively during image write
CONFIG_IMG_ERASE_PROGRESSIVELY=y  


# MCUBOOT_SIGNATURE_KEY_FILE is STM32-only — ESP32 uses unsigned images by default
# (Espressif Kconfig.defconfig sets MCUBOOT_GENERATE_UNSIGNED_IMAGE=y on all ESP32 SoCs).
# Set in board-specific .conf for STM32 boards that require imgtool signing.
###############################################################################
# Cryptography
###############################################################################
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_MODE_CTR_ENABLED=y
CONFIG_MBEDTLS_CIPHER=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_BASE64=y
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_PKCS1_V15=y
###############################################################################
# POSIX / Misc
###############################################################################
CONFIG_POSIX_API=y
CONFIG_REBOOT=y    


# WASM Application Runtime configuration
# App Manager configuration
CONFIG_AKIRA_APP_MANAGER=y
CONFIG_AKIRA_APP_MAX_INSTALLED=8
CONFIG_AKIRA_APP_MAX_RUNNING=2

# OTA Manager
CONFIG_AKIRA_OTA=y

# Web Server / HTTP — enabled by default (Kconfig default y, disable in board conf for no-WiFi boards)
# Embedded Web UI is disabled; device management is via akira-cli over the upload endpoint.
CONFIG_AKIRA_EMBEDDED_WEB=n
# Set a non-empty token to require Bearer auth on /upload and /api/apps/install.
# Example: CONFIG_AKIRA_HTTP_UPLOAD_TOKEN="changeme"
CONFIG_AKIRA_HTTP_UPLOAD_TOKEN="tok3n"
# Enable direct WASM upload via HTTP — disable in release boards, use akira-cli instead.
CONFIG_AKIRA_HTTP_DEV_UPLOAD=y

###############################################################################
# Security
###############################################################################
# DEV MODE: signing disabled. Re-enable for release:
#   CONFIG_AKIRA_APP_SIGNING=y
#   # CONFIG_AKIRA_ALLOW_UNSIGNED_APPS=y
CONFIG_AKIRA_APP_SIGNING=n
CONFIG_AKIRA_ALLOW_UNSIGNED_APPS=y

# Akira Settings

CONFIG_AKIRA_SETTINGS=y
CONFIG_AKIRA_SETTINGS_ENCRYPTION=y
