# Enable experimental CCSDS protocol codecs.
#
# This fragment is opt-in. Use:
#   ./build.sh -b <board> --ccsds

CONFIG_AKIRA_CCSDS=y
CONFIG_AKIRA_CCSDS_CFDP=y

# CFDP-over-UDP testing carries CFDP PDUs in CCSDS Space Packets directly.
# Disable TC/TM transfer-frame/channel-coding support here to avoid pulling in
# CLTU/BCH/RS, TM frame work buffers, the development TC UDP listener thread,
# and CCSDS frame shell commands.
CONFIG_AKIRA_CCSDS_FRAME_SUPPORT=n

# CFDP test profile: keep IPv4/UDP available, but drop HTTP/TCP-oriented
# management paths that compete for ESP32-S3 internal DRAM.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y

CONFIG_AKIRA_HTTP_SERVER=n
CONFIG_AKIRA_EMBEDDED_WEB=n
CONFIG_AKIRA_HTTP_WEBSOCKET=n
CONFIG_AKIRA_HTTP_DEV_UPLOAD=n
CONFIG_AKIRA_APP_SOURCE_HTTP=n
CONFIG_AKIRA_OTA_HTTP=n
CONFIG_AKIRA_MDNS=n
CONFIG_HTTP_SERVER=n

CONFIG_NET_TCP=n
CONFIG_WEBSOCKET_CLIENT=n
CONFIG_AKIRA_WS_CLIENT=n
CONFIG_SHELL_BACKEND_TELNET=n
CONFIG_DNS_RESOLVER=n
CONFIG_SNTP=n

# Akira still uses mbedTLS primitives for non-TLS security features. Disable
# socket TLS and TLS/DTLS protocol support instead of disabling mbedTLS itself.
CONFIG_NET_SOCKETS_SOCKOPT_TLS=n
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=n
CONFIG_MBEDTLS_SSL_PROTO_TLS1_3=n
CONFIG_MBEDTLS_SSL_PROTO_DTLS=n

# Smaller Zephyr network pools for single-purpose UDP CFDP testing.
CONFIG_NET_MAX_CONN=4
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_BUF_RX_COUNT=12
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_NET_BUF_DATA_SIZE=128

# Headless CFDP test target: this profile does not use the console display,
# local HID input, or onboard IMU path. Keep these disabled only in the CCSDS
# fragment so the normal akiraconsole build remains unchanged.
CONFIG_DISPLAY=n
CONFIG_MIPI_DBI=n
CONFIG_ST7789V=n
CONFIG_AKIRA_HID=n
CONFIG_AKIRA_BT_HID=n
CONFIG_SENSOR=n
CONFIG_AKIRA_LSM6DS3_DRIVER=n
