# AkiraOS west module manifest
#
# This file makes AkiraOS importable as a west module in third-party projects.
#
# Usage in a downstream west.yml:
#
#   manifest:
#     projects:
#       - name: akira-os
#         url: https://github.com/ArturR0k3r/AkiraOS.git
#         revision: v1.5.4
#         path: akira-os
#     self:
#       path: my-app
#
# After `west update`, the build system automatically:
#   - Sources AkiraOS CMakeLists.txt as a Zephyr module (adds all sources)
#   - Sources Kconfig for AkiraOS symbols (CONFIG_AKIRA_*, CONFIG_WAMR_*)
#   - Adds boards/ to the board search path  → west build -b akiraconsole_prod/...
#   - Adds dts/   to the DTS bindings path   → AkiraOS DTS bindings available
#
# No -DMODULE_EXT_ROOT or -DBOARD_ROOT flags are needed in downstream projects.
# The flags remain in this repo's own build tasks for self-contained builds.
#
# Requires: Zephyr ≥ 4.0 (module.yml settings: board_root / dts_root added in 3.7)

name: akira-os

build:
  # cmake: root of the module — CMakeLists.txt at repo root is the entry point.
  cmake: .

  settings:
    # board_root: registers boards/ so Zephyr finds akiraconsole_prod,
    # akiraconsole, esp32s3_super_mini, and any custom boards in this tree.
    board_root: .

    # dts_root: registers dts/ so Zephyr finds AkiraOS DTS bindings
    # (akira,ili9341 akira,pwm-dial etc.) when building downstream projects.
    dts_root: .
