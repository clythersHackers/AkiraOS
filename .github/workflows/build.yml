name: SDK App Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases

env:
  WASI_SDK_VERSION: "24"
  WASI_SDK_DIR: /opt/wasi-sdk
  AKIRA_CLI_DIR: AkiraSDK/tools/akira-cli
  WASM_APPS_DIR: AkiraSDK/wasm_apps
  SCRIPTS_DIR: AkiraSDK/scripts
  DIST_DIR: dist

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build + pack generic apps (ble_led, gpio, hello_world, …)
  # ─────────────────────────────────────────────────────────────
  build-generic:
    name: Build generic apps
    runs-on: ubuntu-latest
    outputs:
      artifact: generic-akpkg
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk ${{ env.WASI_SDK_VERSION }}
        run: |
          TARBALL="wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz"
          curl -fsSL \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/${TARBALL}" \
            -o /tmp/wasi-sdk.tar.gz
          sudo mkdir -p ${{ env.WASI_SDK_DIR }}
          sudo tar -xzf /tmp/wasi-sdk.tar.gz --strip-components=1 -C ${{ env.WASI_SDK_DIR }}

      - name: Set up Go & build akira-cli
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.AKIRA_CLI_DIR }}/go.mod
          cache-dependency-path: ${{ env.AKIRA_CLI_DIR }}/go.sum
      - run: |
          cd ${{ env.AKIRA_CLI_DIR }}
          go build -o $GITHUB_WORKSPACE/akira-cli ./...

      - name: Install Python dependencies
        run: pip install --quiet Pillow

      - name: Write signing key
        env:
          AKIRA_SIGNING_KEY: ${{ secrets.AKIRA_SIGNING_KEY }}
        run: |
          echo "$AKIRA_SIGNING_KEY" | base64 -d > /tmp/privkey.pem
          chmod 600 /tmp/privkey.pem

      - name: Build, pack and sign generic apps
        run: |
          set -euo pipefail
          mkdir -p ${{ env.DIST_DIR }}
          CLANG="${{ env.WASI_SDK_DIR }}/bin/clang"
          SDK_INCLUDE="${{ env.WASM_APPS_DIR }}/../include"

          for app_dir in ${{ env.WASM_APPS_DIR }}/generic/*/; do
            app=$(basename "$app_dir")
            echo "── $app ──"

            # Embed icon into manifest if present
            manifest="${app_dir}manifest.json"
            if [ -f "${app_dir}icon.png" ]; then
              python3 ${{ env.SCRIPTS_DIR }}/embed_icon.py \
                "${app_dir}icon.png" "$manifest" "$manifest"
            fi

            # Build .wasm
            wasm="/tmp/${app}.wasm"
            if [ -f "${app_dir}Makefile" ]; then
              make -C "$app_dir" WASI_SDK=${{ env.WASI_SDK_DIR }} --no-print-directory
              cp "${app_dir}${app}.wasm" "$wasm"
            else
              src_files=$(find "$app_dir" -maxdepth 1 -name "*.c")
              "$CLANG" \
                -target wasm32-unknown-unknown \
                -nostdlib \
                -fvisibility=hidden \
                -Wl,--no-entry \
                -Wl,--export=main \
                -Wl,--allow-undefined \
                -Wl,--strip-all \
                -z stack-size=4096 \
                -Wl,--initial-memory=65536 \
                -Wl,--max-memory=65536 \
                -I"AkiraSDK/include" \
                -I"AkiraSDK" \
                -O2 \
                -Wno-incompatible-library-redeclaration \
                -o "$wasm" $src_files
            fi

            # Embed manifest as WASM custom section
            python3 ${{ env.SCRIPTS_DIR }}/embed_manifest.py "$wasm" "$manifest" "$wasm"

            # Pack + sign
            slug="generic-${app}"
            pkg="${{ env.DIST_DIR }}/${slug}.akpkg"
            ./akira-cli pack "$wasm" "$manifest" -o "$pkg"
            ./akira-cli sign "$pkg" --key /tmp/privkey.pem

            # Copy icon PNG for catalogue icon_url
            if [ -f "${app_dir}icon.png" ]; then
              cp "${app_dir}icon.png" "${{ env.DIST_DIR }}/${slug}-icon.png"
            fi
          done

      - name: Shred signing key
        if: always()
        run: shred -u /tmp/privkey.pem || rm -f /tmp/privkey.pem

      - uses: actions/upload-artifact@v4
        with:
          name: generic-akpkg
          path: ${{ env.DIST_DIR }}/*.akpkg
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # 2. Build + pack console apps
  # ─────────────────────────────────────────────────────────────
  build-console:
    name: Build console apps
    runs-on: ubuntu-latest
    outputs:
      artifact: console-akpkg
    steps:
      - uses: actions/checkout@v4

      - name: Install wasi-sdk ${{ env.WASI_SDK_VERSION }}
        run: |
          TARBALL="wasi-sdk-${{ env.WASI_SDK_VERSION }}.0-x86_64-linux.tar.gz"
          curl -fsSL \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_SDK_VERSION }}/${TARBALL}" \
            -o /tmp/wasi-sdk.tar.gz
          sudo mkdir -p ${{ env.WASI_SDK_DIR }}
          sudo tar -xzf /tmp/wasi-sdk.tar.gz --strip-components=1 -C ${{ env.WASI_SDK_DIR }}

      - name: Set up Go & build akira-cli
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.AKIRA_CLI_DIR }}/go.mod
          cache-dependency-path: ${{ env.AKIRA_CLI_DIR }}/go.sum
      - run: |
          cd ${{ env.AKIRA_CLI_DIR }}
          go build -o $GITHUB_WORKSPACE/akira-cli ./...

      - name: Install Python dependencies
        run: pip install --quiet Pillow

      - name: Write signing key
        env:
          AKIRA_SIGNING_KEY: ${{ secrets.AKIRA_SIGNING_KEY }}
        run: |
          echo "$AKIRA_SIGNING_KEY" | base64 -d > /tmp/privkey.pem
          chmod 600 /tmp/privkey.pem

      - name: Build, pack and sign console apps
        run: |
          set -euo pipefail
          mkdir -p ${{ env.DIST_DIR }}
          CLANG="${{ env.WASI_SDK_DIR }}/bin/clang"

          for app_dir in ${{ env.WASM_APPS_DIR }}/console_apps/*/; do
            app=$(basename "$app_dir")
            echo "── $app ──"

            manifest="${app_dir}manifest.json"
            if [ -f "${app_dir}icon.png" ]; then
              python3 ${{ env.SCRIPTS_DIR }}/embed_icon.py \
                "${app_dir}icon.png" "$manifest" "$manifest"
            fi

            wasm="/tmp/${app}.wasm"
            if [ -f "${app_dir}Makefile" ]; then
              make -C "$app_dir" WASI_SDK=${{ env.WASI_SDK_DIR }} --no-print-directory
              cp "${app_dir}${app}.wasm" "$wasm"
            else
              src_files=$(find "$app_dir" -maxdepth 1 -name "*.c")
              "$CLANG" \
                -target wasm32-unknown-unknown \
                -nostdlib \
                -fvisibility=hidden \
                -Wl,--no-entry \
                -Wl,--export=main \
                -Wl,--allow-undefined \
                -Wl,--strip-all \
                -z stack-size=4096 \
                -Wl,--initial-memory=131072 \
                -Wl,--max-memory=131072 \
                -I"AkiraSDK/include" \
                -I"AkiraSDK" \
                -O2 \
                -Wno-incompatible-library-redeclaration \
                -o "$wasm" $src_files
            fi

            python3 ${{ env.SCRIPTS_DIR }}/embed_manifest.py "$wasm" "$manifest" "$wasm"

            slug="console_apps-${app}"
            pkg="${{ env.DIST_DIR }}/${slug}.akpkg"
            ./akira-cli pack "$wasm" "$manifest" -o "$pkg"
            ./akira-cli sign "$pkg" --key /tmp/privkey.pem

            if [ -f "${app_dir}icon.png" ]; then
              cp "${app_dir}icon.png" "${{ env.DIST_DIR }}/${slug}-icon.png"
            fi
          done

      - name: Shred signing key
        if: always()
        run: shred -u /tmp/privkey.pem || rm -f /tmp/privkey.pem

      - uses: actions/upload-artifact@v4
        with:
          name: console-akpkg
          path: ${{ env.DIST_DIR }}/*.akpkg
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # 3. Pack retro games (pre-compiled .aot — no wasi-sdk needed)
  # ─────────────────────────────────────────────────────────────
  build-retro:
    name: Pack retro games
    runs-on: ubuntu-latest
    outputs:
      artifact: retro-akpkg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go & build akira-cli
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.AKIRA_CLI_DIR }}/go.mod
          cache-dependency-path: ${{ env.AKIRA_CLI_DIR }}/go.sum
      - run: |
          cd ${{ env.AKIRA_CLI_DIR }}
          go build -o $GITHUB_WORKSPACE/akira-cli ./...

      - name: Install Python dependencies
        run: pip install --quiet Pillow

      - name: Write signing key
        env:
          AKIRA_SIGNING_KEY: ${{ secrets.AKIRA_SIGNING_KEY }}
        run: |
          echo "$AKIRA_SIGNING_KEY" | base64 -d > /tmp/privkey.pem
          chmod 600 /tmp/privkey.pem

      - name: Pack and sign retro games
        run: |
          set -euo pipefail
          mkdir -p ${{ env.DIST_DIR }}

          for game_dir in ${{ env.WASM_APPS_DIR }}/retro_games/*/; do
            game=$(basename "$game_dir")
            aot="${game_dir}${game}.aot"
            manifest="${game_dir}manifest.json"

            if [ ! -f "$aot" ]; then
              echo "Skip $game — no .aot found"
              continue
            fi
            if [ ! -f "$manifest" ]; then
              echo "Skip $game — no manifest.json found"
              continue
            fi

            echo "── $game ──"

            if [ -f "${game_dir}icon.png" ]; then
              python3 ${{ env.SCRIPTS_DIR }}/embed_icon.py \
                "${game_dir}icon.png" "$manifest" "$manifest"
            fi

            slug="retro_games-${game}"
            pkg="${{ env.DIST_DIR }}/${slug}.akpkg"
            # Pack .aot as the wasm payload (akira-cli pack accepts any binary)
            ./akira-cli pack "$aot" "$manifest" -o "$pkg"
            ./akira-cli sign "$pkg" --key /tmp/privkey.pem

            if [ -f "${game_dir}icon.png" ]; then
              cp "${game_dir}icon.png" "${{ env.DIST_DIR }}/${slug}-icon.png"
            fi
          done

      - name: Shred signing key
        if: always()
        run: shred -u /tmp/privkey.pem || rm -f /tmp/privkey.pem

      - uses: actions/upload-artifact@v4
        with:
          name: retro-akpkg
          path: ${{ env.DIST_DIR }}/*.akpkg
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # 4. Generate catalogue.json and publish GitHub Release
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-generic, build-console, build-retro]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go & build akira-cli
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.AKIRA_CLI_DIR }}/go.mod
          cache-dependency-path: ${{ env.AKIRA_CLI_DIR }}/go.sum
      - run: |
          cd ${{ env.AKIRA_CLI_DIR }}
          go build -o $GITHUB_WORKSPACE/akira-cli ./...

      - name: Download all .akpkg artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-akpkg'
          path: ${{ env.DIST_DIR }}
          merge-multiple: true

      - name: Generate catalogue.json
        run: |
          python3 ${{ env.SCRIPTS_DIR }}/gen_catalogue.py \
            --dir ${{ env.DIST_DIR }} \
            --tag ${{ github.ref_name }} \
            --repo ArturR0k3r/AkiraOS \
            --out ${{ env.DIST_DIR }}/catalogue.json

      - name: Verify catalogue
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("${{ env.DIST_DIR }}/catalogue.json") as f:
              cat = json.load(f)
          required = {"id", "name", "category", "version", "size_bytes",
                      "capabilities", "min_akiraos_version", "download_url"}
          errors = []
          for app in cat.get("apps", []):
              missing = required - set(app.keys())
              if missing:
                  errors.append(f"{app.get('id', '?')}: missing {missing}")
          if errors:
              for e in errors:
                  print("FAIL:", e, file=sys.stderr)
              sys.exit(1)
          print(f"OK — {len(cat['apps'])} apps validated")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AkiraSDK ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.DIST_DIR }}/*.akpkg
            ${{ env.DIST_DIR }}/*-icon.png
            ${{ env.DIST_DIR }}/catalogue.json
