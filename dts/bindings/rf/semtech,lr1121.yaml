description: Semtech LR1121 LoRa/GFSK transceiver

compatible: "semtech,lr1121"

include: spi-device.yaml

properties:
  cs-gpios:
    type: phandle-array
    required: true
    description: |
      GPIO pin used for SPI chip select (NSS).
      This transceiver requires manual CS control.

  reset-gpios:
    type: phandle-array
    required: true
    description: |
      GPIO pin connected to NRESET pin.
      Active low reset signal.

  busy-gpios:
    type: phandle-array
    required: true
    description: |
      GPIO pin connected to BUSY pin.
      Used to poll command completion status.
      Should be configured with pull-down resistor.

  irq-gpios:
    type: phandle-array
    required: false
    description: |
      GPIO pin connected to IRQ pin (optional).
      Can be used for interrupt-driven operation.

  spi-max-frequency:
    type: int
    required: true
    description: |
      Maximum SPI frequency in Hz.
      LR1121 supports 1-10 MHz.
