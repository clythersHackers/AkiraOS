# BOARD_ZEPHYR: esp32s3_super_mini/esp32s3/procpu
# BOARD_CHIP: esp32s3
# BOARD_DESC: ESP32-S3 Super Mini
# BOARD_ALIAS: esp32s3_super_mini

# =============================================================================
# ESP32-S3 Super Mini Board Configuration for AkiraOS
# =============================================================================

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

###############################################################################
# Display — disabled on ESP32-S3 Super Mini (no display hardware)
###############################################################################
CONFIG_DISPLAY=n
CONFIG_MIPI_DBI=n
CONFIG_MIPI_DBI_SPI=n
CONFIG_AKIRA_FONTS_IN_PSRAM=n
CONFIG_AKIRA_FRAMEBUFFER_IN_PSRAM=n
