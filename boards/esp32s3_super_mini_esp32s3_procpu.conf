# BOARD_ZEPHYR: esp32s3_super_mini/esp32s3/procpu
# BOARD_CHIP: esp32s3
# BOARD_DESC: ESP32-S3 Super Mini (FH4R2: 4MB Flash, 2MB Quad PSRAM)
# BOARD_ALIAS: esp32s3_super_mini

# =============================================================================
# ESP32-S3 Super Mini Board Configuration for AkiraOS
# ESP32-S3FH4R2: 4MB Flash, 2MB Quad PSRAM
# =============================================================================

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

###############################################################################
# Memory Configuration (4MB Flash, no PSRAM)
# 96KB heap: BT controller needs ~50KB at init; WiFi takes the rest.
# Without PSRAM both subsystems share internal DRAM — a larger pool is
# required to prevent esp_bt_controller_init() from running OOM.
###############################################################################
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SHELL_STACK_SIZE=4096


###############################################################################
# Bluetooth
# ── disable all: CONFIG_BT=n
###############################################################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AkiraOS"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=32
CONFIG_BT_MAX_CONN=1
CONFIG_BT_L2CAP_TX_MTU=300
CONFIG_BT_BUF_ACL_RX_SIZE=300
CONFIG_BT_BUF_ACL_TX_SIZE=300
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_ATT_PREPARE_COUNT=1
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_HCI_TX_STACK_SIZE=1024
CONFIG_BT_SMP=y
CONFIG_BT_SIGNING=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_GATT_CACHING=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_BAS=y

# --- BT debug for connection diagnostics ---
CONFIG_BT_LOG_LEVEL_DBG=y

CONFIG_BT_CONN_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=8192


###############################################################################
# WiFi — disabled on Super Mini (no PSRAM; DRAM too small for WiFi + BT)
###############################################################################
CONFIG_WIFI=n
CONFIG_WIFI_ESP32=n
CONFIG_ESP32_BT_CONTROLLER_STACK_SIZE=4096
CONFIG_ESP32_BT_CONTROLLER_TASK_PRIO=2


###############################################################################
# HID
# ── disable BT HID:  CONFIG_AKIRA_BT_HID=n
# ── disable all HID: CONFIG_AKIRA_HID=n
###############################################################################
CONFIG_AKIRA_HID=y
CONFIG_AKIRA_HID_MODE_KB_MOUSE=y
CONFIG_AKIRA_BT_HID=y
CONFIG_AKIRA_HID_MAX_ACTIONS=16


###############################################################################
# AkiraOS Bluetooth Features
###############################################################################
CONFIG_AKIRA_BT_ECHO=y

###############################################################################
# Display — disabled on ESP32-S3 Super Mini (no display hardware)
###############################################################################
CONFIG_DISPLAY=n
CONFIG_MIPI_DBI=n
CONFIG_MIPI_DBI_SPI=n
CONFIG_AKIRA_FONTS_IN_PSRAM=n
CONFIG_AKIRA_FRAMEBUFFER_IN_PSRAM=n
