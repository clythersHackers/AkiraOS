# BOARD_ZEPHYR: rpi_pico2
# BOARD_CHIP: rp2350
# BOARD_DESC: Raspberry Pi Pico 2 (RP2350, Cortex-M33)
# BOARD_ALIAS: pico2 rp2350

# =============================================================================
# RP2350 — 520 KB SRAM, dual Cortex-M33 @ 150 MHz, no WiFi, no PSRAM
# Shell via USB CDC-ACM (built-in USB).
# More RAM than RP2040 — larger WAMR heap, less aggressive size opts.
# =============================================================================

###############################################################################
# Memory — 520 KB SRAM, no PSRAM
###############################################################################
CONFIG_AKIRA_PSRAM=n
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_WAMR_HEAP_SIZE=131072

###############################################################################
# USB CDC-ACM for shell
###############################################################################
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_CONSOLE=n
CONFIG_USB_DEVICE_MANUFACTURER="Akira"
CONFIG_USB_DEVICE_PRODUCT="AkiraOS"

###############################################################################
# No WiFi on bare Pico 2 (use Pico 2 W config for WiFi)
###############################################################################
CONFIG_WIFI=n
CONFIG_NET_L2_WIFI_MGMT=n

###############################################################################
# Bluetooth — not available on bare Pico 2 (no radio)
###############################################################################
CONFIG_BT=n

###############################################################################
# GPIO and basic peripherals
###############################################################################
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_ADC=y
CONFIG_PWM=y

###############################################################################
# No SD card slot on bare Pico 2
###############################################################################
CONFIG_DISK_ACCESS=n
CONFIG_AKIRA_APP_SOURCE_SD=n

###############################################################################
# Flash storage — 4 MB QSPI flash on Pico 2
###############################################################################
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

###############################################################################
# Watchdog
###############################################################################
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y

###############################################################################
# Power management
###############################################################################
CONFIG_PM=y
CONFIG_PM_DEVICE=y

###############################################################################
# Logging
###############################################################################
CONFIG_LOG_DEFAULT_LEVEL=2

###############################################################################
# Shell
###############################################################################
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_BACKEND_TELNET=n

###############################################################################
# RP2350 Cortex-M33 has FPU and hardware MPU — AOT is possible but
# WAMR AOT for RP2350 is not yet validated in AkiraOS; use interpreter.
###############################################################################
CONFIG_WAMR_AOT_SUPPORT=n
