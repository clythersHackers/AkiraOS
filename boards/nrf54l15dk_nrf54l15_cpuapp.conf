# BOARD_ZEPHYR: nrf54l15dk/nrf54l15/cpuapp
# BOARD_CHIP: nrf54l15
# BOARD_DESC: Nordic nRF54L15 DK

# Nordic nRF54L15 DK Specific Configuration
# Board: nrf54l15dk/nrf54l15/cpuapp
# SoC: Nordic nRF54L15 (ARM Cortex-M33 @ 128MHz + RISC-V coprocessor)
#
# Note: XIAO nRF54L15 is not yet in Zephyr 4.2.1.
# Using nRF54L15DK as reference platform for nRF54L15 development.

# Memory Configuration - nRF54L15 has 256KB RAM
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# Bluetooth (nRF54L15 supports BLE 6.0)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AkiraOS-nRF54L15"

# WiFi: not available on nRF54L15
CONFIG_WIFI=n

# IEEE 802.15.4 / Thread / Zigbee support
CONFIG_NET_L2_IEEE802154=y
CONFIG_IEEE802154=y

# GPIO and basic peripherals
CONFIG_GPIO=y

# No SD card slot — disable DISK_ACCESS and SD-based app install
CONFIG_DISK_ACCESS=n
CONFIG_AKIRA_APP_SOURCE_SD=n

# I2C for sensors
CONFIG_I2C=y
CONFIG_SENSOR=y

# SPI
CONFIG_SPI=y

# PWM for LEDs
CONFIG_PWM=y

# ADC
CONFIG_ADC=y

# Flash storage — board-specific NVS and Settings in addition to prj.conf flash
CONFIG_NVS=y

# Settings storage
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Watchdog
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y

# ADC — WASM API (CONFIG_ADC=y already set above)
CONFIG_AKIRA_WASM_ADC=y
CONFIG_AKIRA_WASM_ADC_VREF_MV=3600
CONFIG_AKIRA_WASM_ADC_RESOLUTION=12

# Power Management (nRF54L15 is ultra-low power)
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# USB CDC ACM for console (board has built-in USB)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Logging — reduced level to save RAM (overrides prj.conf default=3)
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_MINIMAL=y

# Shell — minimal mode to save RAM
CONFIG_SHELL_MINIMAL=y
CONFIG_SHELL_BACKEND_TELNET=n
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=n
CONFIG_NET_SOCKETS_OFFLOAD=n

# Size optimizations for RAM-constrained nRF54L15
CONFIG_SIZE_OPTIMIZATIONS=y

###############################################################################
# App Manager
###############################################################################
# (CONFIG_AKIRA_APP_MANAGER is enabled in prj.conf)

# NOTE: WAMR optimizations (mini loader, minimal mode) are controlled by
# the WAMR CMake build configuration, not Kconfig options.

