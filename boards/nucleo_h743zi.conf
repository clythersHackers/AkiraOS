# BOARD_ZEPHYR: nucleo_h743zi
# BOARD_CHIP: stm32h743zi
# BOARD_DESC: ST Nucleo-H743ZI (STM32H743ZI, Cortex-M7 @ 480 MHz)
# BOARD_ALIAS: h743 stm32h7

# =============================================================================
# STM32H743ZI — 1 MB RAM (TCM+AXI+SRAM), 2 MB flash, Cortex-M7 with FPU+DSP
# Ethernet via LAN8742A, PSRAM optionally via FMC.
# =============================================================================

###############################################################################
# Memory — 1 MB RAM total; no on-module PSRAM on bare Nucleo
###############################################################################
CONFIG_AKIRA_PSRAM=n
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_WAMR_HEAP_SIZE=524288

###############################################################################
# FPU / DSP — Cortex-M7 has full FPU + DSP
###############################################################################
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

###############################################################################
# Speed optimisations — H743 has headroom
###############################################################################
CONFIG_SPEED_OPTIMIZATIONS=y

###############################################################################
# Ethernet — LAN8742A on Nucleo-H743ZI
###############################################################################
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y
CONFIG_ETH_STM32_HAL_MII=n
CONFIG_NET_DHCPV4=y

###############################################################################
# WiFi — not available on bare Nucleo (no radio)
###############################################################################
CONFIG_WIFI=n

###############################################################################
# Bluetooth — not available on bare Nucleo
###############################################################################
CONFIG_BT=n

###############################################################################
# GPIO and peripherals
###############################################################################
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_UART_INTERRUPT_DRIVEN=y

###############################################################################
# SD card via SPI/SDMMC on Nucleo
###############################################################################
CONFIG_DISK_ACCESS=y
CONFIG_AKIRA_APP_SOURCE_SD=y

###############################################################################
# Flash storage — internal 2 MB flash, dual-bank
###############################################################################
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

###############################################################################
# Watchdog
###############################################################################
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y

###############################################################################
# Power management
###############################################################################
CONFIG_PM=y
CONFIG_PM_DEVICE=y

###############################################################################
# Logging — full level on H743 (has plenty of flash)
###############################################################################
CONFIG_LOG_DEFAULT_LEVEL=3

###############################################################################
# Shell — full features, H743 has flash headroom
###############################################################################
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y

###############################################################################
# WAMR — AOT for Cortex-M7 is supported
###############################################################################
CONFIG_WAMR_AOT_SUPPORT=y
