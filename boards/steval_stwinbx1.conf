# BOARD_ZEPHYR: steval_stwinbx1
# BOARD_CHIP: stm32
# BOARD_DESC: ST STEVAL-STWINBX1

# ST STEVAL-STWINBX1 Specific Configuration
# Board: steval_stwinbx1
# SoC: STM32U585AI (ARM Cortex-M33 @ 160MHz)

# Memory Configuration
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Bluetooth (via BlueNRG-M2SA module on SPI3)
# DISABLED: BlueNRG HCI init hangs/crashes during bring-up — likely needs
# the correct reset GPIO sequence or SPI timing adjustments in the overlay.
# Re-enable once the BlueNRG reset pin is verified in the board schematic.
# CONFIG_BT=y
# CONFIG_BT_HCI_VS=y
# CONFIG_BT_BLUENRG_ACI=y
# CONFIG_BT_PERIPHERAL=y
# CONFIG_BT_DEVICE_NAME="AkiraOS-STWINBX1"
CONFIG_BT=n

# GPIO and basic peripherals
# (CONFIG_GPIO, CONFIG_I2C, CONFIG_SPI, CONFIG_SENSOR are set in prj.conf)

# Individual sensor drivers (STWINBX1-specific)
# DISABLED for initial bring-up: SPI2/I2C2 sensor init is causing crashes
# (likely SPI CS timing, sensor power-on sequence, or interrupt config).
# Re-enable and test one at a time after basic boot is validated.
# Temperature
# CONFIG_STTS22H=y

# IMU - 6-axis accelerometer/gyroscope with ML Core
# CONFIG_ISM330DHCX=y
# CONFIG_ISM330DHCX_TRIGGER_GLOBAL_THREAD=y

# Accelerometer
# CONFIG_IIS2DLPC=y
# CONFIG_IIS2DLPC_TRIGGER_GLOBAL_THREAD=y

# Inclinometer with ML Core
# CONFIG_IIS2ICLX=y

# Magnetometer
# CONFIG_IIS2MDC=y
# CONFIG_IIS2MDC_TRIGGER_GLOBAL_THREAD=y

# Pressure sensor
# CONFIG_LPS22DF=y  # Use ILPS22QS if available

# ADC
CONFIG_ADC=y

# DAC - Disabled to save flash
# CONFIG_DAC=y

# PWM
CONFIG_PWM=y

# USB (Type-C) — DISABLED: USB Device Stack Next init crashes on STM32U585 on
# first bring-up (likely missing HSI48 clock config or USB peripheral issue).
# Re-enable once USB clock tree is validated in the overlay.
# CONFIG_USB_DEVICE_STACK_NEXT=y
# CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_UART_LINE_CTRL=n

# Disable WiFi (no WiFi hardware on STM32)
CONFIG_WIFI=n

# Flash storage — SDMMC disabled for initial bring-up (needs SD card + power validation)
# CONFIG_SDMMC_STACK=y
CONFIG_NVS=y

# File System (board override: FAT for SD card only — prj.conf has both FAT+LittleFS)
CONFIG_FILE_SYSTEM_LITTLEFS=y

# Settings storage
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
# STM32U585 flash page size = 8KB; NVS sector must equal one page.
# 16KB partition / 2 sectors = 8KB per sector = 1 page per sector ✓
CONFIG_SETTINGS_NVS_SECTOR_COUNT=2

# CAN FD - Disabled to save flash
# CONFIG_CAN=y
# CONFIG_CAN_FD_MODE=y

# Watchdog
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y

# ADC — WASM API (CONFIG_ADC=y already set above)
CONFIG_AKIRA_WASM_ADC=y
CONFIG_AKIRA_WASM_ADC_VREF_MV=3300
CONFIG_AKIRA_WASM_ADC_RESOLUTION=12

# RTC - disabled until clock source is properly configured in overlay
# CONFIG_RTC=y

# Power Management — DISABLED: Zephyr PM enters STM32U585 STOP mode without
# wakeup sources configured → CPU sleeps and never wakes → double fault.
# Re-enable after adding wakeup pin (user button) and LP clock restore in overlay.
# CONFIG_PM=y
# CONFIG_PM_DEVICE=y
CONFIG_PM=n
CONFIG_PM_DEVICE=n


# Crypto — MbedTLS already in prj.conf; no board-specific additions needed.


# Logging — reduced level to save flash (overrides prj.conf default=3)
CONFIG_LOG_DEFAULT_LEVEL=2

# Shell
CONFIG_SHELL_MINIMAL=y
CONFIG_SHELL_BACKEND_TELNET=n
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=n
CONFIG_NET_SOCKETS_OFFLOAD=n

# Size optimizations for flash-constrained MCUboot slot
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_LOG_MODE_MINIMAL=y

###############################################################################
# App Manager
###############################################################################
# (CONFIG_AKIRA_APP_MANAGER is enabled in prj.conf)

# NOTE: WAMR optimizations (mini loader, minimal mode) are controlled by
# the WAMR CMake build configuration, not Kconfig options.

# Network socket service stack - increased for OTA and upload operations
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096

# MCUboot signing key for imgtool (STM32 boards sign images via Zephyr's imgtool)
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="bootloader/mcuboot/root-rsa-2048.pem"

# RTT console — read app boot log + panic via J-Link (no UART needed)
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=16384
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Stack sizes: BLE + sensors + WASM init requires more than the default 4KB
# main stack.  Set generously for initial bring-up; tune down after profiling.
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_ISR_STACK_SIZE=4096

# Explicit bring-up diagnostic overrides — ensure disabled subsystems stay off
# regardless of what prj.conf or auto-selection might enable
CONFIG_ISM330DHCX=n
CONFIG_IIS2DLPC=n
CONFIG_IIS2ICLX=n
CONFIG_IIS2MDC=n
CONFIG_STTS22H=n
CONFIG_BT=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
