# BOARD_ZEPHYR: esp32c6_devkitc/esp32c6/hpcore
# BOARD_CHIP: esp32c6
# BOARD_DESC: ESP32-C6 DevKitC (RISC-V HP Core)
# ESP32-C6: RISC-V @ 160MHz, 512KB SRAM, 8MB Flash (WROOM-N8 module)
# Radios: WiFi 6 (802.11ax), BLE 5.3, IEEE 802.15.4 (Thread/Zigbee)

###############################################################################
# Memory Configuration — 512KB SRAM (better than C3's 400KB)
###############################################################################
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_WAMR_HEAP_SIZE=131072

###############################################################################
# Thread Local Storage — MANDATORY for WAMR on RISC-V
# Without this, Zephyr does not manage the RISC-V thread pointer (tp) register,
# leaving garbage values that cause WAMR to crash on TLS variable access.
###############################################################################
CONFIG_THREAD_LOCAL_STORAGE=y

###############################################################################
# WiFi 6 (802.11ax)
###############################################################################
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y

# Disable AMPDU to reduce memory usage
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n

###############################################################################
# Bluetooth BLE 5.3
# C6 has enough SRAM to run WiFi + BLE simultaneously (unlike C3)
###############################################################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AkiraOS-C6"

###############################################################################
# IEEE 802.15.4 — Thread / Zigbee radio
###############################################################################
CONFIG_NET_L2_IEEE802154=y
CONFIG_IEEE802154=y

###############################################################################
# Peripherals
###############################################################################
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_ADC=y
CONFIG_WATCHDOG=y
CONFIG_PWM=y

###############################################################################
# Flash and Storage — XIP from Flash
# Code and WASM binaries execute directly from flash via hardware cache.
# LittleFS partition on flash is the primary WASM app store.
###############################################################################
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_STREAM_FLASH=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ENABLE_IMAGE_CHECK=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y

###############################################################################
# LittleFS — WASM app storage on internal flash (XIP-from-Flash path)
###############################################################################
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_FC_HEAP_SIZE=512

###############################################################################
# SD Card — hardware-agnostic via DT zephyr,sdhc-spi-slot binding
# CS GPIO is defined in the overlay (cs-gpios), not in source code.
# Disable CONFIG_AKIRA_SD_CARD here if no SD hardware is connected.
###############################################################################
CONFIG_SDHC=y
CONFIG_DISK_ACCESS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_MAX_LFN=255
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINT_COUNT=1
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINTS="SD"
CONFIG_AKIRA_SD_CARD=y
CONFIG_AKIRA_APP_SOURCE_SD=y

###############################################################################
# Network buffers
###############################################################################
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

###############################################################################
# WAMR — AOT DISABLED on RISC-V
# C6 has no PSRAM; AOT code would need to live in limited SRAM.
# Interpreter mode on RISCV32 is well-supported and sufficient.
###############################################################################
CONFIG_WAMR_AOT_SUPPORT=n

###############################################################################
# App Manager
###############################################################################
CONFIG_AKIRA_APP_MANAGER=y
CONFIG_MAX_CONTAINERS=4
CONFIG_AKIRA_WASM_APP_STACK_SIZE=4096

###############################################################################
# Logging
###############################################################################
CONFIG_LOG_BUFFER_SIZE=512
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=4
