# BOARD_ZEPHYR: esp32c3_devkitm
# BOARD_CHIP: esp32c3
# BOARD_DESC: ESP32-C3 DevKitM (RISC-V)

# ESP32-C3 DevKitM Specific Configuration
# RISC-V single-core @ 160MHz with WiFi + BLE 5.0

# Memory configuration (ESP32 wroom has limited SRAM ~400KB)
# Reduced heap to fit in memory
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536

# ESP32 WiFi
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y



# Bluetooth (ESP32-C3 supports BLE 5.0) - DISABLED to save RAM
# Enable one of WiFi or BT, not both, due to RAM constraints
CONFIG_BT=n
# CONFIG_BT_PERIPHERAL=y
# CONFIG_BT_DEVICE_NAME="AkiraOS-C3"

# SPI for display
CONFIG_SPI=y

# I2C for sensors
CONFIG_I2C=y
CONFIG_SENSOR=y

# ADC - disabled to save space
CONFIG_ADC=n

# Watchdog
CONFIG_WATCHDOG=y

# PWM - disabled to save space
CONFIG_PWM=n

# Reduce logging to save RAM
CONFIG_LOG_BUFFER_SIZE=256
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_MAX_LEVEL=4

# Disable features to save RAM
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_TAB=n
CONFIG_SHELL_TAB_AUTOCOMPLETION=n
CONFIG_SHELL_WILDCARD=n
CONFIG_SHELL_HELP=y
CONFIG_SHELL_HELP_ON_WRONG_ARGUMENT_COUNT=n

# Reduce network buffer sizes
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8

###############################################################################
# App Manager - Enabled with minimal WAMR for RAM-constrained ESP32-C3
###############################################################################
CONFIG_AKIRA_APP_MANAGER=y

# NOTE: WAMR optimizations (mini loader, minimal mode) are controlled by
# the WAMR CMake build configuration, not Kconfig options.

# Network socket service stack - increased for OTA and upload operations
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096

# Size and shell optimizations
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_SHELL_MINIMAL=y
