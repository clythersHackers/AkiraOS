# BOARD_ZEPHYR: esp32s3_devkitm/esp32s3/procpu
# BOARD_CHIP: esp32s3
# BOARD_DESC: ESP32-S3 DevKitM

# ESP32-S3 Specific Configuration
# ESP32-S3 N16R8 Module: 16MB Flash, 8MB PSRAM (OPI)

###############################################################################
# PSRAM (External SPIRAM) Configuration - 8MB OPI PSRAM
###############################################################################
CONFIG_ESP_SPIRAM=y
CONFIG_ESP_SPIRAM_SIZE=8388608
CONFIG_ESP_SPIRAM_HEAP_SIZE=2097152
CONFIG_SPIRAM_MODE_OCT=y
CONFIG_AKIRA_PSRAM=y
CONFIG_SPIRAM_TYPE_ESPPSRAM64=y
CONFIG_SPIRAM_SPEED_80M=y

# Enable MEMC driver - REQUIRED for PSRAM configuration
# This allows WAMR heap buffer to be placed in PSRAM instead of internal DRAM
CONFIG_MEMC=y

# Optional: Move read-only data to PSRAM to free internal DRAM 
CONFIG_SPIRAM_RODATA=n

# Skip PSRAM memtest for faster boot (enable for debugging)
CONFIG_ESP_SPIRAM_MEMTEST=n

###############################################################################
# Thread Local Storage - REQUIRED for ESP32-S3 WAMR
###############################################################################
# ESP32-S3 has THREADPTR register (XCHAL_HAVE_THREADPTR=1).
# Without TLS enabled, Zephyr doesn't initialize or manage THREADPTR,
# leaving garbage values that cause crashes when WAMR accesses TLS.
CONFIG_THREAD_LOCAL_STORAGE=y

###############################################################################
# Memory Configuration (with PSRAM)
###############################################################################
# Keep internal DRAM heap smaller - use PSRAM for large allocations
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# Shell needs larger stack for WASM operations
CONFIG_SHELL_STACK_SIZE=4096

# WiFi Configuration
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_ESP_WIFI_HEAP_SPIRAM=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# Shared Multi-Heap for PSRAM allocation
CONFIG_SHARED_MULTI_HEAP=y

###############################################################################
# SPI, I2C, Sensors
###############################################################################
# SPI for display
CONFIG_SPI=y

# Sensor support
CONFIG_I2C=y
CONFIG_SENSOR=y

# Disable AMPDU (reduces memory usage)
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n

###############################################################################
# Network Buffer Configuration
###############################################################################
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

###############################################################################
# App Manager - Enabled with PSRAM support
###############################################################################
# With 8MB PSRAM, we can enable App Manager
# WASM runtime (WAMR) heaps will use PSRAM

# Place large static assets into PSRAM where available
CONFIG_AKIRA_FONTS_IN_PSRAM=y
CONFIG_AKIRA_FRAMEBUFFER_IN_PSRAM=y

###############################################################################
# WAMR Memory Configuration - Using PSRAM for large buffers
###############################################################################
# With CONFIG_MEMC=y and ESP32-S3 PSRAM support,
# the WAMR heap buffer is placed in external SPIRAM
# This allows much larger WAMR heap without consuming internal DRAM
# Configure WAMR heap size for PSRAM placement
CONFIG_WAMR_HEAP_SIZE=1048576

# Limit max containers to save memory
CONFIG_MAX_CONTAINERS=4

###############################################################################
# Logging - Use immediate mode for debugging
###############################################################################
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_AKIRA_BT_ECHO=y
CONFIG_AKIRA_EMBEDDED_WEB=y

###############################################################################
# USB Stack
###############################################################################
CONFIG_UDC_DWC2_STACK_SIZE=4096
CONFIG_USBD_THREAD_STACK_SIZE=4096
