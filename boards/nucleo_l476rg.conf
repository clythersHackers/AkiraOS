# BOARD_ZEPHYR: nucleo_l476rg
# BOARD_CHIP: stm32
# BOARD_DESC: ST Nucleo L476RG

# SPDX-License-Identifier: Apache-2.0

# enable uart driver
CONFIG_SERIAL=y

# enable GPIO
CONFIG_GPIO=y

# console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

#enable MPU
CONFIG_ARM_MPU=y

# Enable HW stack protection
CONFIG_HW_STACK_PROTECTION=y

# =============================================================================
# Memory budget overrides for STM32L476RG (96KB SRAM)
# =============================================================================

# Reduce kernel heap from 64KB to 8KB — biggest single RAM saver
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Reduce thread stacks
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
CONFIG_IDLE_STACK_SIZE=256

# Reduce net buffers (no WiFi/Ethernet on Nucleo)
CONFIG_NET_BUF_RX_COUNT=4
CONFIG_NET_BUF_TX_COUNT=4
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_DATA_SIZE=64
CONFIG_NET_MAX_CONN=4
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=512
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=512

# No SD card on Nucleo — disable FAT filesystem
CONFIG_FAT_FILESYSTEM_ELM=n
CONFIG_FS_FATFS_LFN=n
CONFIG_DISK_ACCESS=n

# No WiFi/BT — disable WebSocket and OTA transports that need them
CONFIG_WEBSOCKET_CLIENT=n
CONFIG_HTTP_SERVER=n

# Reduce app slots and WASM containers to fit SRAM
CONFIG_AKIRA_APP_MAX_INSTALLED=4
CONFIG_AKIRA_APP_MAX_RUNNING=1
CONFIG_MAX_CONTAINERS=1
CONFIG_AKIRA_WASM_APP_STACK_SIZE=2048

# No HTTP/mDNS — no WiFi/Ethernet on Nucleo
CONFIG_AKIRA_HTTP_SERVER=n
CONFIG_AKIRA_MDNS=n

# Reduce shell memory usage
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_TAB_AUTOCOMPLETION=n
CONFIG_SHELL_CMD_BUFF_SIZE=64

# Reduce log buffer
CONFIG_LOG_BUFFER_SIZE=256

# Disable stack statistics to save a little RAM
CONFIG_SYS_HEAP_RUNTIME_STATS=n

# MCUboot signing key for imgtool (STM32 boards sign images via Zephyr's imgtool)
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="bootloader/mcuboot/root-rsa-2048.pem"
