
# ESP32 DevKitC 

# WiFi Configuration
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
# ESP32-WROOM-32 has no external PSRAM — SPIRAM/PSRAM options must be off.
# If using an ESP32-WROVER module (which has 4MB/8MB PSRAM), you can
# re-enable: CONFIG_ESP_SPIRAM, CONFIG_MEMC, CONFIG_AKIRA_FONTS_IN_PSRAM.

###############################################################################
# DRAM budget: ~300 KB total, WiFi stack alone uses ~100 KB.
# Aggressive DRAM reduction is required — total savings target: ~215 KB.
###############################################################################

# WASM runtime enabled with a reduced heap to fit in DRAM.
# ESP32-WROOM-32 has ~300 KB usable DRAM; WiFi + mbedTLS consume ~150 KB.
# Tune CONFIG_WAMR_HEAP_SIZE downward if link-time DRAM overflow is reported.
# Set to 0 and also set CONFIG_AKIRA_WASM_RUNTIME=n to disable WASM entirely.
CONFIG_WAMR_HEAP_SIZE=32768

# Reduce kernel heap from 64 KB (prj.conf default) to 8 KB — saves 57 KB.
# The DevKitC is a development board; large dynamic allocations are not needed.
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Telnet shell backend disabled — saves stack + internal buffers (~4 KB).
CONFIG_SHELL_BACKEND_TELNET=n
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=n

# Tighten network buffers (prj.conf sets 12/10 × 256 B; cut to 4 × 128 B).
CONFIG_NET_BUF_RX_COUNT=4
CONFIG_NET_BUF_TX_COUNT=4
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_MAX_CONN=2
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048

# OTA over HTTP is impractical without PSRAM (no buffer for the full image).
CONFIG_AKIRA_OTA=n
CONFIG_AKIRA_OTA_HTTP=n

# Embedded web server not useful for headless DevKitC.
CONFIG_AKIRA_HTTP_SERVER=n

# Settings encryption requires mbedTLS AES; disable to slim BSS.
CONFIG_AKIRA_SETTINGS_ENCRYPTION=n


# Default stack sizes
CONFIG_MAIN_STACK_SIZE=4096

