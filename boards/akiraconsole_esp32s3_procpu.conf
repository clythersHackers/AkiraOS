# BOARD_ZEPHYR: akiraconsole/esp32s3/procpu
# BOARD_CHIP: esp32s3
# BOARD_DESC: Akira Console (ESP32-S3 N16R8)
# BOARD_ALIAS: akiraconsole

# ESP32-S3 Specific Configuration
# ESP32-S3 N16R8 Module: 16MB Flash, 8MB PSRAM (OPI)

###############################################################################
# PSRAM (External SPIRAM) Configuration - 8MB OPI PSRAM
###############################################################################
CONFIG_ESP_SPIRAM=y
CONFIG_ESP_SPIRAM_SIZE=8388608
CONFIG_ESP_SPIRAM_HEAP_SIZE=4194304
CONFIG_SPIRAM_MODE_OCT=y
CONFIG_AKIRA_PSRAM=y
CONFIG_SPIRAM_TYPE_ESPPSRAM64=y
CONFIG_AKIRA_WASM_APP_STACK_SIZE=8192
CONFIG_WAMR_AOT_SUPPORT=y
CONFIG_SPIRAM_SPEED_80M=y

# Enable MEMC driver - REQUIRED for PSRAM configuration
# This allows WAMR heap buffer to be placed in PSRAM instead of internal DRAM
CONFIG_MEMC=y

# Optional: Move read-only data to PSRAM to free internal DRAM 
CONFIG_SPIRAM_RODATA=y
CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y



# Skip PSRAM memtest for faster boot (enable for debugging)
CONFIG_ESP_SPIRAM_MEMTEST=n

###############################################################################
# Thread Local Storage
###############################################################################
# THREAD_LOCAL_STORAGE depends on ARCH_HAS_THREAD_LOCAL_STORAGE (not set for
# Xtensa in Zephyr 4.x). Enabling it with Newlib causes a z_errno_wrap linker
# error because the Xtensa SDK ships picolibc headers in its sysroot.
# WAMR manages THREADPTR initialization independently of Zephyr TLS.

###############################################################################
# Memory Configuration (with PSRAM)
###############################################################################
# Keep internal DRAM heap small — most allocations come from the 4 MB PSRAM
# shared_multi_heap. Reducing from 65536 to 16384 frees ~49 KB of BSS in
# dram0_0_seg, resolving the linker overflow caused by BT+USB+display libs.
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# Shell needs larger stack for WASM operations
CONFIG_SHELL_STACK_SIZE=6144

# Shared Multi-Heap for PSRAM allocation
CONFIG_SHARED_MULTI_HEAP=y


###############################################################################
# Bluetooth
###############################################################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AkiraConsole"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=32
CONFIG_BT_MAX_CONN=1
CONFIG_BT_L2CAP_TX_MTU=300
CONFIG_BT_BUF_ACL_RX_SIZE=300
CONFIG_BT_BUF_ACL_TX_SIZE=300


# GATT
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_ATT_PREPARE_COUNT=1
# Required for dynamic GATT service register/unregister (ble_app_service)
CONFIG_BT_GATT_DYNAMIC_DB=y

# BT Work Queue Stack Sizes
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_HCI_TX_STACK_SIZE=1024

# Security
CONFIG_BT_SMP=y
CONFIG_BT_SIGNING=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
# Allow both legacy and Secure Connections pairing — older iOS/iPadOS uses legacy
CONFIG_BT_SMP_SC_PAIR_ONLY=n
# Service Changed indication — tells bonded peers (iOS/Android/Windows) to
# re-discover GATT database when firmware updates the attribute table.
# Without this, hosts cache stale handles and disconnect with 0x13.
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_GATT_CACHING=y

# Bond persistence — saves LTK / IRK to NVS so bonds survive reboot
# Without this the device loses keys on reset → security err 4 on reconnect
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y

# Device Information Service (optional - disable to save memory)
# CONFIG_BT_DIS=y
# CONFIG_BT_DIS_STR_MAX=21
# Battery Service (optional - disable to save memory)
# Battery Service - mandatory for HOGP (iOS won't complete HID enumeration without it)
CONFIG_BT_BAS=y

###############################################################################
# HID & BT (BT-capable board — moved from prj.conf)
###############################################################################
CONFIG_AKIRA_HID=y
CONFIG_AKIRA_HID_MODE_KB_MOUSE=y
CONFIG_AKIRA_BT_HID=y


###############################################################################
# ESP32-S3 WiFi/BT
###############################################################################
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_ESP_WIFI_HEAP_SPIRAM=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y
CONFIG_NET_SOCKETS_OFFLOAD=y
# Network socket service stack - increased for OTA and upload operations
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096


# Bluetooth Controller Configuration
CONFIG_ESP32_BT_CONTROLLER_STACK_SIZE=2048
CONFIG_ESP32_BT_CONTROLLER_TASK_PRIO=2

# SPI for display
CONFIG_SPI=y

# Sensor support
CONFIG_I2C=y
CONFIG_SENSOR=y

# Disable AMPDU if you're still having issues (reduces memory usage)
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n

# Place large static assets into PSRAM where available
CONFIG_AKIRA_FONTS_IN_PSRAM=y
CONFIG_AKIRA_FRAMEBUFFER_IN_PSRAM=y

###############################################################################
# WAMR Memory Configuration - Using PSRAM for large buffers
###############################################################################
# With CONFIG_MEMC=y and ESP32-S3 PSRAM support,
# the WAMR heap buffer is placed in external SPIRAM
# This allows much larger WAMR heap without consuming internal DRAM
# Configure WAMR heap size for PSRAM placement
CONFIG_WAMR_HEAP_SIZE=1048576

# Limit max containers to save memory
CONFIG_MAX_CONTAINERS=2

###############################################################################
# Logging - Use immediate mode for debugging
###############################################################################
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_AKIRA_BT_ECHO=n

###############################################################################
# Display & Input
###############################################################################
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y


###############################################################################
# SD Card Support — SPI-SDHC via GPIO11/12/13/14
# MOSI=GPIO11, SCK=GPIO12, MISO=GPIO13, CS=GPIO14
# DTS node spi_sdhc0 on SPI2 (see akiraconsole_esp32s3_procpu.overlay)
# DISK_DRIVER_SDMMC is auto-selected by DTS (zephyr,sdmmc-disk node enabled)
###############################################################################
CONFIG_AKIRA_SD_CARD=n
# SDHC and SDMMC_STACK are auto-selected by the DTS zephyr,sdhc-spi-slot node
# (hardware is present on the PCB); cannot be forced to n. AKIRA_SD_CARD=n
# disables the high-level SD API while the drivers remain compiled in.
CONFIG_FAT_FILESYSTEM_ELM=n
CONFIG_FS_FATFS_LFN=n
CONFIG_AKIRA_APP_SOURCE_SD=n
CONFIG_AKIRA_SD_XIP=n

###############################################################################
# USB Stack
###############################################################################
CONFIG_UDC_DWC2_STACK_SIZE=2048
CONFIG_USBD_THREAD_STACK_SIZE=2048

###############################################################################
# LR1121 LoRa Transceiver Support
###############################################################################
CONFIG_AKIRA_MODULE_RF=n
CONFIG_AKIRA_RF_FRAMEWORK=n
CONFIG_AKIRA_LR1121=n

###############################################################################
# TFT Display Driver — DC=GPIO9, RST=GPIO45, CS=GPIO10 (same for both)
# Default: ST7789V.  To use AkiraOS ILI9341, swap the three lines below:
#   comment ST7789V + MIPI_DBI_SPI, uncomment AKIRA_ILI9341_DRIVER.
###############################################################################
CONFIG_ST7789V=y
CONFIG_MIPI_DBI_SPI=y
#CONFIG_AKIRA_ILI9341_DRIVER=y

# Debug display and SPI (disable in production builds)
CONFIG_DISPLAY_LOG_LEVEL_DBG=y
CONFIG_MIPI_DBI_LOG_LEVEL_DBG=y
CONFIG_SPI_LOG_LEVEL_DBG=y


###############################################################################
# Flash configuration
###############################################################################
CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
CONFIG_ESPTOOLPY_FLASHMODE_DIO=y
CONFIG_ESPTOOLPY_FLASHFREQ_40M=y


###############################################################################
# Akira USB
###############################################################################
CONFIG_AKIRA_USB=n
CONFIG_AKIRA_USB_HID=n

CONFIG_USBD_LOG_LEVEL_INF=n
CONFIG_USBD_HID_LOG_LEVEL_INF=n
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=n
CONFIG_UDC_DRIVER_LOG_LEVEL_INF=n

###############################################################################
# Sensors - LSM6DS3 IMU on I2C0 (SDA=GPIO8, SCL=GPIO18)
# LSM6DS3TR-C shares WHO_AM_I 0x6A with LSM6DSL — no custom driver needed
###############################################################################
CONFIG_AKIRA_LSM6DS3_DRIVER=y
# WASM-level Timer/I2C APIs
CONFIG_AKIRA_WASM_TIMER=y

###############################################################################
# IPC / HID — PSRAM build: AKIRA_BULK_BSS routes arrays to .ext_ram.bss.
# MSG_MAX_SIZE=256 and QUEUE_DEPTH=4 are board overrides above prj.conf defaults.
###############################################################################
CONFIG_AKIRA_HID_MAX_ACTIONS=16
CONFIG_AKIRA_IPC_MSG_MAX_SIZE=256
CONFIG_AKIRA_IPC_QUEUE_DEPTH=4
CONFIG_AKIRA_WASM_I2C=y

###############################################################################
# WASM API Surface — hardware-specific APIs enabled on this board
###############################################################################
CONFIG_AKIRA_WASM_HID=y

# Network WASM API — enabled on akiraconsole; PSRAM allows larger buffers.
CONFIG_AKIRA_WASM_NET=y
CONFIG_AKIRA_NET_MAX_STREAMS=8
CONFIG_AKIRA_NET_POLL_STACK_SIZE=4096
CONFIG_AKIRA_NET_EVENT_QUEUE_DEPTH=16
CONFIG_AKIRA_WASM_BLE=y

###############################################################################
# ADC — ESP32-S3 SAR ADC via adc1 (alias akira-adc in overlay)
###############################################################################
CONFIG_ADC=y
CONFIG_AKIRA_WASM_ADC=y
CONFIG_AKIRA_WASM_ADC_VREF_MV=3300
CONFIG_AKIRA_WASM_ADC_RESOLUTION=12

###############################################################################
# Watchdog — wdt0 enabled in overlay
###############################################################################
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y

CONFIG_AKIRA_MDNS=y
CONFIG_NET_HOSTNAME="akiraos"