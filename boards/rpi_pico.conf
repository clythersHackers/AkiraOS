# BOARD_ZEPHYR: rpi_pico
# BOARD_CHIP: rp2040
# BOARD_DESC: Raspberry Pi Pico (RP2040, dual Cortex-M0+)
# BOARD_ALIAS: pico rp2040

# =============================================================================
# RP2040 — 264 KB SRAM, dual Cortex-M0+ @ 133 MHz, no WiFi, no PSRAM
# Shell via USB CDC-ACM (built-in USB), not UART.
# =============================================================================

###############################################################################
# Memory — tight, no PSRAM
###############################################################################
CONFIG_AKIRA_PSRAM=n
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_WAMR_HEAP_SIZE=65536

###############################################################################
# USB CDC-ACM for shell (RP2040 has hardware USB, no UART on standard Pico)
###############################################################################
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_CONSOLE=n
CONFIG_USB_DEVICE_MANUFACTURER="Akira"
CONFIG_USB_DEVICE_PRODUCT="AkiraOS"

###############################################################################
# No WiFi on bare Pico (use Pico W config for WiFi)
###############################################################################
CONFIG_WIFI=n
CONFIG_NET_L2_WIFI_MGMT=n

###############################################################################
# Bluetooth — not available on bare Pico (no radio)
###############################################################################
CONFIG_BT=n

###############################################################################
# GPIO and basic peripherals
###############################################################################
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_ADC=y
CONFIG_PWM=y

###############################################################################
# No SD card slot on bare Pico
###############################################################################
CONFIG_DISK_ACCESS=n
CONFIG_AKIRA_APP_SOURCE_SD=n

###############################################################################
# Flash storage — RP2040 has 2 MB QSPI flash, use LittleFS
###############################################################################
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

###############################################################################
# Watchdog
###############################################################################
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y

###############################################################################
# Power management — basic only (no DSP/radio sleep states)
###############################################################################
CONFIG_PM=y
CONFIG_PM_DEVICE=y

###############################################################################
# Logging — minimal to save RAM
###############################################################################
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_MINIMAL=y

###############################################################################
# Shell — minimal mode to save RAM
###############################################################################
CONFIG_SHELL_MINIMAL=y
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_BACKEND_TELNET=n

###############################################################################
# Cortex-M0+ has no hardware FPU and no unaligned memory access
# WAMR must run in interpreter mode (no AOT for Cortex-M0+)
###############################################################################
CONFIG_WAMR_AOT_SUPPORT=n

###############################################################################
# Size optimisations for RAM-constrained board
###############################################################################
CONFIG_SIZE_OPTIMIZATIONS=y
