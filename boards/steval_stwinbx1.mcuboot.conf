# MCUboot-specific Kconfig overrides for steval_stwinbx1
#
# Route console to SEGGER RTT so MCUboot log/panic output is readable
# through J-Link without a physical UART connection.
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Stack sizes: tinycrypt SHA256 compress() allocates a 256-byte w[] array on
# the stack; combined with the MCUboot/Zephyr call depth (boot_go → validate →
# bootutil_img_validate → sha256_update → compress) and logging, the default
# 10KB overflows.  RSA-2048 (when re-enabled) needs even more.
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_ISR_STACK_SIZE=4096
