# MCUboot memory-reduction config for ESP32-H2 (RISC-V HP core).
# dram_seg overflows by ~2 KB with default settings. Reducing the main stack
# from 10 KB to 8 KB clears the overflow without disrupting code layout.

CONFIG_MAIN_STACK_SIZE=8192
