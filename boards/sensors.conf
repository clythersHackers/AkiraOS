# Optional overlay for boards with physical sensors.
# Add to your build by appending -DEXTRA_CONF_FILE=boards/sensors.conf
# or by including it in your board-specific .conf.
#
# Sensor drivers are standard Zephyr drivers — enable them here and add the
# corresponding DTS node in the board .overlay. No Akira-specific module flags
# required; akira_sensor_api.c auto-discovers any ready device via Zephyr's
# sensor subsystem.

# Zephyr sensor subsystem (required for akira_sensor_api)
CONFIG_SENSOR=y

# Enable the required buses
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_GPIO=y

# ---- Sensor drivers (add the ones your board has) ----

# Bosch BME280 — temperature, humidity, pressure
# CONFIG_BME280=y

# ST LSM6DSL (also covers LSM6DS3TR-C which shares WHO_AM_I 0x6A)
# CONFIG_LSM6DSL=y

# TI INA219 — current and power monitor
# CONFIG_INA219=y
