# BOARD_ZEPHYR: akiraconsole_prod/esp32s3/procpu
# BOARD_CHIP:  esp32s3
# BOARD_DESC:  AkiraConsole Production (ESP32-S3-WROOM-1-N16R8)
# BOARD_ALIAS: akiraconsole_prod

###############################################################################
# PSRAM — ESP32-S3-WROOM-1-N16R8: 16 MB Flash, 8 MB OPI PSRAM
###############################################################################
CONFIG_ESP_SPIRAM=y
CONFIG_ESP_SPIRAM_SIZE=8388608
CONFIG_ESP_SPIRAM_HEAP_SIZE=4194304
CONFIG_SPIRAM_MODE_OCT=y
CONFIG_AKIRA_PSRAM=y
CONFIG_SPIRAM_TYPE_ESPPSRAM64=y
CONFIG_SPIRAM_SPEED_80M=y
CONFIG_MEMC=y
CONFIG_SPIRAM_RODATA=y
CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
CONFIG_ESP_SPIRAM_MEMTEST=n
# WASM stacks in SRAM — avoids SPI0/PSRAM conflict on flash reads
CONFIG_AKIRA_WASM_APP_STACK_SIZE=16384
CONFIG_WAMR_AOT_SUPPORT=y


###############################################################################
# Memory
# Internal SRAM heap reduced to fit display + TCA6408 in dram0.bss.
# Large allocations use the 4 MB PSRAM heap (ESP_SPIRAM_HEAP_SIZE).
###############################################################################
CONFIG_HEAP_MEM_POOL_SIZE=59392
CONFIG_MAIN_STACK_SIZE=3968
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_SHELL_STACK_SIZE=6144
CONFIG_SHARED_MULTI_HEAP=y


###############################################################################
# Flash — 16 MB DIO 40 MHz
###############################################################################
CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
CONFIG_ESPTOOLPY_FLASHMODE_DIO=y
CONFIG_ESPTOOLPY_FLASHFREQ_40M=y


###############################################################################
# Bluetooth
# ── disable all: CONFIG_BT=n
###############################################################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AkiraOS"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=32
CONFIG_BT_MAX_CONN=1
CONFIG_BT_L2CAP_TX_MTU=300
CONFIG_BT_BUF_ACL_RX_SIZE=300
CONFIG_BT_BUF_ACL_TX_SIZE=300
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_ATT_PREPARE_COUNT=1
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_HCI_TX_STACK_SIZE=1024
CONFIG_BT_SMP=y
CONFIG_BT_SIGNING=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_GATT_CACHING=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_BAS=y


###############################################################################
# WiFi
# ── disable: CONFIG_WIFI=n  CONFIG_WIFI_ESP32=n
###############################################################################
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_ESP_WIFI_HEAP_SPIRAM=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_SHELL_BACKEND_TELNET=n
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_ESP32_BT_CONTROLLER_STACK_SIZE=4096
CONFIG_ESP32_BT_CONTROLLER_TASK_PRIO=2
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=3072


###############################################################################
# HID
# ── disable BT HID:  CONFIG_AKIRA_BT_HID=n
# ── disable all HID: CONFIG_AKIRA_HID=n
###############################################################################
CONFIG_AKIRA_HID=y
CONFIG_AKIRA_HID_MODE_KB_MOUSE=y
CONFIG_AKIRA_BT_HID=y
CONFIG_AKIRA_HID_MAX_ACTIONS=16


###############################################################################
# USB
# ── disable: CONFIG_AKIRA_USB=n  CONFIG_AKIRA_USB_HID=n
###############################################################################
CONFIG_UDC_DWC2_STACK_SIZE=4096
CONFIG_USBD_THREAD_STACK_SIZE=4096
CONFIG_AKIRA_USB=y
CONFIG_AKIRA_USB_HID=y
CONFIG_USBD_LOG_LEVEL_INF=n
CONFIG_USBD_HID_LOG_LEVEL_INF=n
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=n


###############################################################################
# Bus controllers
# ── disable SPI: CONFIG_SPI=n
# ── disable I2C: CONFIG_I2C=n
###############################################################################
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_SENSOR=y


###############################################################################
# Display — NOT CONNECTED on this unit
# ── Option A (ST7789V):  set DISPLAY=y MIPI_DBI=y ST7789V=y MIPI_DBI_SPI=y
# ── Option B (ILI9341):  set DISPLAY=y AKIRA_ILI9341_DRIVER=y
#                         CMakeLists auto-appends *_ili9341.overlay
# ── Option C (Sharp):    set AKIRA_SHARP_DISPLAY=y LS0XX=y
###############################################################################
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=n
CONFIG_MIPI_DBI_SPI=n
CONFIG_ST7789V=n
CONFIG_AKIRA_SHARP_DISPLAY=y
CONFIG_LS0XX=y


###############################################################################
# Backlight PWM — AP2502 LED driver EN via GPIO48 (LEDC channel 0)
#
# Circuit: GPIO48 → RC filter (R=11kΩ incl. RV1 pot + R58, C=10nF,
# f_corner≈9kHz) → 74LVC2G14 Schmitt trigger (U5A/U5B) → AP2502 EN.
#
# RV1 = RK10J12R0A0B dual potentiometer (hardware brightness wheel):
#   - Wired as rheostat: pin 1 shorted to pin 5
#   - Coarse range: 9%–91%.  CW = minimum brightness (max resistance).
#   - No software driver needed — purely passive RC component.
#
# Software brightness via PWM duty cycle (see 'backlight' alias in DTS):
#   pwm_set_dt(&bl_pwm, PWM_HZ(10000), PWM_HZ(10000) * brightness_255 / 255);
###############################################################################
CONFIG_PWM=y
CONFIG_PWM_CAPTURE=y
# MCPWM_ESP32 auto-selected via DT_HAS_ESPRESSIF_ESP32_MCPWM_ENABLED
# PWM_LED_ESP32 auto-selected via DT_HAS_ESPRESSIF_ESP32_LEDC_ENABLED

###############################################################################
# Rotary dial input (RK10J12R0A0B) — reports INPUT_ABS_WHEEL via input subsystem
# Same API as buttons; any app reads it via input_event_cb or WASM input API
###############################################################################
CONFIG_INPUT=y
CONFIG_AKIRA_PWM_DIAL=y


###############################################################################
# SD Card — SPI2 CS2 (GPIO14, SD_CS)
# Molex 503398-1892 holder.  Card detect (SD_DET) via TCA6408 P5 when fitted.
# AKIRA_SD_CARD auto-selects DISK_ACCESS + FAT_FILESYSTEM_ELM via Kconfig.
# AKIRA_APP_SOURCE_SD: load WASM apps from SD card.
# AKIRA_SD_XIP:        execute WASM bytecode directly from SD (XIP mode).
# ── disable: CONFIG_AKIRA_SD_CARD=n
###############################################################################
CONFIG_AKIRA_SD_CARD=y
CONFIG_AKIRA_APP_SOURCE_SD=y
CONFIG_AKIRA_SD_XIP=y


###############################################################################
# TCA6408ARSV — I2C GPIO expander — FITTED
# status="okay" in overlay → DT_HAS_NXP_PCAL6408A_ENABLED=y →
# GPIO_PCAL64XXA driver auto-selected.  SPI2 cs-gpios use expander pins.
###############################################################################


###############################################################################
# IMU — LSM6DS3 (I2C 0x6A, INT1→GPIO1)
# ── disable: CONFIG_AKIRA_LSM6DS3_DRIVER=n
###############################################################################
CONFIG_AKIRA_LSM6DS3_DRIVER=y


###############################################################################
# Environmental sensor — BME280 (I2C 0x77, optional)
# ── disable: CONFIG_BME280=n
###############################################################################
CONFIG_BME280=y


###############################################################################
# Battery charger — BQ25601RTW (I2C addr 0x6B, Zephyr charger API)
# CHARGER subsystem + BQ25601 driver enabled via DT_HAS_TI_BQ25601_ENABLED.
# Reports status/online/fault; sets ICHG and VREG from DTS defaults at boot.
###############################################################################
CONFIG_CHARGER=y
CONFIG_CHARGER_BQ25601=y


###############################################################################
# NFC — ST25DV64K (I2C addr 0x53/0x57)
# Provides read/write to 64 Kbit EEPROM and system config registers.
# GPO interrupt → GPIO21 (NFC_INT).
###############################################################################
CONFIG_AKIRA_ST25DV=y


###############################################################################
# RF — LR2021IMLTRT LoRa transceiver (SPI2, CS via TCA6408 P4)
# The module is LR2021IMLTRT; the chipset inside is Semtech LR1121.
# The Akira driver and Kconfig symbol are named after the chipset: AKIRA_LR1121.
# CS (LR_CS), RST (RF_RST), BUSY (LR_BUSY) are all via TCA6408 expander.
# LR_INT (DIO5) → GPIO47 direct.
# ── enable: CONFIG_AKIRA_MODULE_RF=y  CONFIG_AKIRA_RF_FRAMEWORK=y  CONFIG_AKIRA_LR1121=y
#            Also requires TCA6408 enabled (see TCA6408 section above).
###############################################################################
CONFIG_AKIRA_LR1121=n
CONFIG_AKIRA_MODULE_RF=n
CONFIG_AKIRA_RF_FRAMEWORK=n


###############################################################################
# RF — CC1121RHB Sub-GHz transceiver (SPI2, CS via TCA6408 P1)
# Covers 315/433/868/915 MHz bands; default config: 868 MHz 2-FSK 4800 bps.
# Shared RF_RST with LR2021 via TCA6408 P2.
# ── enable: CONFIG_AKIRA_MODULE_RF=y  CONFIG_AKIRA_RF_FRAMEWORK=y
#            CONFIG_AKIRA_CC1121=y  (also requires TCA6408 enabled)
###############################################################################
CONFIG_AKIRA_CC1121=n   # enable when TCA6408 is fitted


###############################################################################
# Fuel gauge — BQ28Z610DRZ (I2C addr 0x55)
# DTS node declared in board DTS: bq28z610@55 (compatible "ti,bq28z610").
# No upstream Zephyr driver exists for BQ28Z610.  Accessed via WASM I2C API.
# power_manager.c uses CONFIG_FUEL_GAUGE=y + zephyr fuel_gauge API — that path
# requires a driver binding the IC to Zephyr's fuel_gauge subsystem, which is
# not yet implemented for BQ28Z610.  Until then, keep FUEL_GAUGE disabled.
# ── enable when driver is ready: CONFIG_FUEL_GAUGE=y  CONFIG_AKIRA_POWER_MANAGER=y
###############################################################################
CONFIG_AKIRA_POWER_MANAGER=n


###############################################################################
# NFC Dynamic Tag — ST25DV64K (I2C addr 0x53 / 0x57)
# DTS node declared in board DTS: st25dv@53 (compatible "st,st25dv64k").
# GPO interrupt → NFC_INT → GPIO21.
# No Zephyr driver — accessed via WASM I2C API (raw register reads/writes).
# No antenna routed on base board; I2C communication only.
###############################################################################


###############################################################################
# USB-C PD controller — FUSB302BMPX (I2C addr 0x22)
# DTS node declared in board DTS: fusb302@22 (compatible "fcs,fusb302").
# INT_N → TCA6408 P6 → fires IO_INT → GPIO46.
# ── enable stack: CONFIG_USBC_TCPC_FUSB302=y  (+ full USB-C PD Kconfig setup)
###############################################################################
# CONFIG_USBC_TCPC_FUSB302=y


###############################################################################
# Battery charger — BQ25601RTW (I2C addr 0x6B)
# DTS node declared in board DTS: bq25601@6b (compatible "ti,bq25601").
# PWR_INT → GPIO3.  PSEL pulled HIGH → 500 mA default input current limit.
# No Zephyr upstream driver.  Accessed via WASM I2C API.
###############################################################################


###############################################################################
# Watchdog
# ── disable: CONFIG_WATCHDOG=n  CONFIG_AKIRA_WDT=n
###############################################################################
CONFIG_WATCHDOG=y
CONFIG_AKIRA_WDT=y
CONFIG_AKIRA_WASM_WDT=y


###############################################################################
# ADC — adc1 SAR ADC
# ── disable: CONFIG_ADC=n  CONFIG_AKIRA_WASM_ADC=n
###############################################################################
CONFIG_ADC=y
CONFIG_AKIRA_WASM_ADC=y
CONFIG_AKIRA_WASM_ADC_VREF_MV=3300
CONFIG_AKIRA_WASM_ADC_RESOLUTION=12


###############################################################################
# Init-priority: SPI at 75 so TCA6408 (priority 70) is ready before SPI2.
# Required because SPI2 cs-gpios reference TCA6408 P6 (LR_CS) and P3 (CC_CS).
###############################################################################
CONFIG_SPI_INIT_PRIORITY=75


###############################################################################
# WAMR / WASM runtime heap (PSRAM via MEMC)
###############################################################################
CONFIG_WAMR_HEAP_SIZE=1048576
CONFIG_MAX_CONTAINERS=2


###############################################################################
# WASM API surface
# ── disable individually with =n to trim binary
###############################################################################
CONFIG_AKIRA_WASM_TIMER=y
CONFIG_AKIRA_WASM_I2C=y
CONFIG_AKIRA_WASM_HID=y
CONFIG_AKIRA_WASM_NET=y
CONFIG_AKIRA_NET_MAX_STREAMS=8
CONFIG_AKIRA_NET_POLL_STACK_SIZE=4096
CONFIG_AKIRA_NET_EVENT_QUEUE_DEPTH=16
CONFIG_AKIRA_WASM_BLE=y


###############################################################################
# IPC
###############################################################################
CONFIG_AKIRA_IPC_MSG_MAX_SIZE=256
CONFIG_AKIRA_IPC_QUEUE_DEPTH=4


###############################################################################
# Akira subsystems
###############################################################################
CONFIG_AKIRA_BT_ECHO=n
CONFIG_AKIRA_EMBEDDED_WEB=n
CONFIG_AKIRA_FONTS_IN_PSRAM=y
CONFIG_AKIRA_FRAMEBUFFER_IN_PSRAM=y


###############################################################################
# Logging
###############################################################################
CONFIG_LOG_MODE_IMMEDIATE=y
# SD card debug — uncomment if needed:
# CONFIG_SDHC_LOG_LEVEL_DBG=y

###############################################################################
# Production debug savings — disable monitoring overhead not needed in field
###############################################################################
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_STACK_INFO=n
CONFIG_SYS_HEAP_RUNTIME_STATS=n
# CONFIG_SD_LOG_LEVEL_DBG=y
