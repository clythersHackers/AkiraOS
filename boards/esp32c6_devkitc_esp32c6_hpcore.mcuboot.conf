#
# MCUboot memory-reduction config for ESP32-C6 (RISC-V HP core).
# iram_seg = 48 KB, dram_seg = 40 KB — tight fit with full Bluetooth/WiFi SoC
# overhead.  Disable verbose logging and boot banner to reclaim ~4 KB.

# Disable all logging to save IRAM (log format strings) and DRAM (log buffers)
CONFIG_LOG=n
CONFIG_MCUBOOT_LOG_LEVEL_OFF=y

# Suppress the boot banner string
CONFIG_BOOT_BANNER=n

# Reduce main stack from 10 KB (default) to 4 KB — MCUboot SHA256 + swap fits
# in 4 KB; saves 6 KB of dram_seg BSS.
CONFIG_MAIN_STACK_SIZE=4096

# Disable WiFi and Bluetooth to remove modem_clock HAL IRAM functions
# (~0x390 B of IRAM_ATTR code) that overflow the 48 KB iram_seg budget.
# MCUboot only uses the flash driver; radios are not needed at boot time.
CONFIG_WIFI=n
CONFIG_BT=n
# Disable printk to prevent abort()'s printk() call from generating a
# cross-segment reference from .iram0.loader_text to .iram0.text.
# With CONFIG_LOG=n and CONFIG_BOOT_BANNER=n there is no console output anyway.
CONFIG_PRINTK=n