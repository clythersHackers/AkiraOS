# FIXME: Rename to <your-board-identifier-with-slashes-replaced-by-underscores>.conf
# Example: my_sensor_node_nrf54l15_cpuapp.conf
#
# Application-level Kconfig overlay for your board.
# Applied on top of prj.conf by the AkiraOS build system.
# Start by uncommenting only what your hardware actually has.
# Remove sections for peripherals not present.
#
# Reference implementation: boards/akiraconsole_prod_esp32s3_procpu.conf

# =============================================================================
# PSRAM (ESP32 family only)
# =============================================================================
# FIXME: Uncomment if your ESP32 module includes PSRAM (e.g. N8R8, N16R8).
# Required for running more than 2 WASM apps concurrently.
# See docs/hardware/min-hw-requirements.md for SRAM tier breakdown.
#
# CONFIG_ESP_SPIRAM=y
# CONFIG_ESP_SPIRAM_SIZE=8388608          # FIXME: 2097152 (2MB) | 4194304 (4MB) | 8388608 (8MB)
# CONFIG_ESP_SPIRAM_HEAP_SIZE=4194304     # FIXME: typically half of SPIRAM_SIZE
# CONFIG_SPIRAM_MODE_OCT=y               # FIXME: OCT for N8R8/N16R8; QUAD for older modules
# CONFIG_AKIRA_PSRAM=y
# CONFIG_SPIRAM_TYPE_ESPPSRAM64=y
# CONFIG_SPIRAM_SPEED_80M=y
# CONFIG_MEMC=y
# CONFIG_SPIRAM_RODATA=y
# CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
# CONFIG_ESP_SPIRAM_MEMTEST=n

# =============================================================================
# Memory — tune these for your SRAM budget
# See docs/hardware/min-hw-requirements.md for tier guidance.
# =============================================================================
CONFIG_HEAP_MEM_POOL_SIZE=65536          # FIXME: 32768 (min) | 65536 (standard) | 131072 (full)
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096  # FIXME: 1024 (min) | 4096 (standard+)
CONFIG_SHELL_STACK_SIZE=4096             # FIXME: reduce to 2048 if tight on SRAM
# CONFIG_SHARED_MULTI_HEAP=y            # FIXME: uncomment if using PSRAM heap

# =============================================================================
# Flash geometry (ESP32 family only)
# =============================================================================
# FIXME: Uncomment and set for your flash chip.
# CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y      # 4 MB
# CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y      # 8 MB
# CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y     # 16 MB
# CONFIG_ESPTOOLPY_FLASHMODE_DIO=y      # FIXME: DIO (most modules) | QIO | OPI
# CONFIG_ESPTOOLPY_FLASHFREQ_40M=y      # FIXME: 20M | 40M | 80M

# =============================================================================
# WASM Runtime
# =============================================================================
# FIXME: Set heap and container limits to fit your SRAM tier.
# WAMR_HEAP_SIZE is a soft quota hint (not a real pool); actual allocation
# comes from CONFIG_HEAP_MEM_POOL_SIZE (SRAM) or PSRAM heap.
CONFIG_AKIRA_WASM_RUNTIME=y
CONFIG_WAMR_AOT_SUPPORT=n               # FIXME: set =y for ESP32-S3 or native_sim
CONFIG_WAMR_HEAP_SIZE=131072            # FIXME: 65536 (min) | 131072 (std) | 1048576 (PSRAM)
CONFIG_AKIRA_WASM_APP_STACK_SIZE=8192   # FIXME: 8192 (min) | 16384 (with PSRAM)
CONFIG_MAX_CONTAINERS=2                 # FIXME: 1 (min tier) | 2 (std) | 8 (full with PSRAM)

