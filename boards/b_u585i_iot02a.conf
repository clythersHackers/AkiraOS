# B-U585I-IOT02A Board Configuration
# Large partition build (904KB slot)

# Console (board-specific: SERIAL, PRINTK, EARLY_CONSOLE not in prj.conf)
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# Logging — use immediate mode (board-specific override)
CONFIG_LOG_MODE_IMMEDIATE=y

# Memory (768KB SRAM)
CONFIG_HEAP_MEM_POOL_SIZE=262144
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ISR_STACK_SIZE=4096

# Crypto
CONFIG_CRYPTO=y
# TINYCRYPT not available in this Zephyr configuration; disable to avoid Kconfig warnings
# CONFIG_TINYCRYPT=y
# CONFIG_TINYCRYPT_AES=y
# CONFIG_TINYCRYPT_SHA256=y

# Settings
CONFIG_SETTINGS=y

# Shell
CONFIG_SHELL_BACKEND_TELNET=y

# USB
# CONFIG_USB_DEVICE_STACK=y
# CONFIG_USB_DEVICE_PRODUCT="AkiraOS B-U585I-IOT02A"
# CONFIG_USB_CDC_ACM=y
# CONFIG_UART_LINE_CTRL=y

# OTA over USB - Disabled as it is not yet supported and tested on B-U585I-IOT02A
CONFIG_AKIRA_OTA_USB=n    

# Networking (Ethernet — no WiFi offload, static config)
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_SOCKETS_OFFLOAD=n

# LittleFS (board override — prj.conf enables both FAT+LittleFS; keep only LittleFS here)
CONFIG_FAT_FILESYSTEM_ELM=n
CONFIG_FILE_SYSTEM_LITTLEFS=y
# No SD card slot on this board — disable DISK_ACCESS and SD app source
CONFIG_DISK_ACCESS=n
CONFIG_AKIRA_APP_SOURCE_SD=n

# Disable WiFi and ESP32-specific features
CONFIG_WIFI=n
CONFIG_ESP_SPIRAM=n
