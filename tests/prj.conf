# ── Zephyr test framework ──────────────────────────────────────────────────────
CONFIG_ZTEST=y
# CONFIG_ZTEST_NEW_API does not exist in Zephyr v4; new API is always on

# ── Coverage (gcov) ────────────────────────────────────────────────────────────
CONFIG_COVERAGE=y
CONFIG_COVERAGE_GCOV=y

# ── libc ───────────────────────────────────────────────────────────────────────
CONFIG_NEWLIB_LIBC=y
CONFIG_PICOLIBC=n
CONFIG_EXTERNAL_LIBC=n

# ── Logging ────────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# ── Kernel / heap ──────────────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096

# ── AkiraOS config ─────────────────────────────────────────────────────────────
CONFIG_AKIRA_OS=y
CONFIG_AKIRA_LOG_LEVEL=2
CONFIG_AKIRA_WASM_RUNTIME=n
CONFIG_AKIRA_AUDIT_LOG_SIZE=16
CONFIG_AKIRA_SANDBOX_EXEC_TIMEOUT_MS=5000
CONFIG_AKIRA_APP_SIGNING=n

# ── Crypto (for app_signing tests) ────────────────────────────────────────────
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_SHA256=y
# Disable the smaller-footprint SHA-256 implementation — it produces wrong
# results on native_sim (at least with Zephyr v4.3.0 / mbedTLS 3.x builtin).
# The standard implementation is slightly larger but correct.
CONFIG_MBEDTLS_SHA256_SMALLER=n

# ── Flash + OTA ────────────────────────────────────────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_DOUBLE_WRITES=y

# Do NOT enable CONFIG_BOOTLOADER_MCUBOOT — it selects USE_DT_CODE_PARTITION
# which has unsatisfied dependencies on native_sim.  Without it,
# ota_manager.c compiles with OTA_FLASH_AVAILABLE=0, and the OTA ztest cases
# that require a live flash path call ztest_test_skip() gracefully.

# ── Disable hardware not present on native_sim ─────────────────────────────────
CONFIG_GPIO=n
CONFIG_SPI=n
CONFIG_I2C=n
CONFIG_DISPLAY=n
CONFIG_WIFI=n
CONFIG_BT=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_AKIRA_USB_HID=n
CONFIG_SENSOR=n

# ── Networking (not needed for tests) ─────────────────────────────────────────
CONFIG_NETWORKING=n
